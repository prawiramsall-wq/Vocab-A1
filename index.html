<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Academic Vocabulary Challenge</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#eaf4ff,#f5faff);
padding:40px 20px;
}

.container{
max-width:1000px;
margin:auto;
}

.header{
text-align:center;
margin-bottom:35px;
}

.header h1{
font-size:42px;
color:#0a4d8f;
margin-bottom:10px;
}

.header p{
font-size:18px;
color:#5d7288;
}

.quiz-card{
background:white;
padding:25px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
border-left:6px solid #0a66c2;
}

.question-number{
font-size:18px;
font-weight:700;
color:#0a4d8f;
margin-bottom:12px;
}

.question{
font-size:18px;
line-height:1.7;
margin-bottom:15px;
color:#333;
}

input{
width:100%;
padding:14px;
font-size:16px;
border:2px solid #cfe2ff;
border-radius:12px;
transition:.3s;
}

input:focus{
outline:none;
border-color:#0a66c2;
}

.answer{
margin-top:12px;
font-weight:bold;
display:none;
}

.correct{
color:#198754;
}

.wrong{
color:#dc3545;
}

button{
display:block;
margin:35px auto;
padding:16px 40px;
font-size:18px;
font-weight:700;
border:none;
border-radius:14px;
background:#0a66c2;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#084d93;
}

.result-box{
display:none;
background:white;
padding:30px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
text-align:center;
margin-top:30px;
}

.score{
font-size:60px;
font-weight:bold;
color:#0a66c2;
margin:10px 0;
}

.percentage{
font-size:24px;
color:#0a4d8f;
}

.badge{
margin-top:15px;
font-size:22px;
font-weight:bold;
}

.footer{
margin-top:15px;
color:#666;
}

</style>
</head>
<body>

<div class="container">

<div class="header">
<h1>🎓 Advanced Academic Vocabulary Challenge</h1>
<p>Complete each sentence with the correct academic word.</p>
</div>

<form id="quizForm"></form>

<button type="button" onclick="checkAnswers()">
Submit Answers
</button>

<div class="result-box" id="resultBox">
<h2>Your Score</h2>
<div class="score" id="score"></div>
<div class="percentage" id="percentage"></div>
<div class="badge" id="badge"></div>
<div class="footer">
Review the correct answers below and keep improving your academic vocabulary.
</div>
</div>

</div>

<script>

const questions = [

{
question:"The researcher carefully _____ the data before writing the final report.",
answer:"analyzed"
},

{
question:"Students should _____ their opinions with evidence from reliable sources.",
answer:"support"
},

{
question:"The school decided to _____ a new learning program next semester.",
answer:"implement"
},

{
question:"The results showed a _____ improvement in student performance.",
answer:"significant"
},

{
question:"Scientists continue to _____ new solutions to environmental problems.",
answer:"develop"
},

{
question:"The professor asked the class to _____ the main causes of climate change.",
answer:"evaluate"
},

{
question:"The study aims to _____ the effects of social media on teenagers.",
answer:"examine"
},

{
question:"Researchers must _____ accurate records throughout the experiment.",
answer:"maintain"
},

{
question:"The government plans to _____ access to education in rural areas.",
answer:"expand"
},

{
question:"Critical thinking helps students _____ complex problems effectively.",
answer:"solve"
},

{
question:"The findings may _____ future educational policies.",
answer:"influence"
},

{
question:"Students need to _____ information from different sources before drawing conclusions.",
answer:"gather"
},

{
question:"Technology has greatly _____ communication around the world.",
answer:"enhanced"
},

{
question:"The speaker used several examples to _____ his argument.",
answer:"demonstrate"
},

{
question:"The company developed an effective _____ to increase productivity.",
answer:"strategy"
}

];

const form = document.getElementById("quizForm");

questions.forEach((q,index)=>{

form.innerHTML += `

<div class="quiz-card">

<div class="question-number">
Question ${index+1}
</div>

<div class="question">
${q.question}
</div>

<input
type="text"
id="q${index}"
placeholder="Type your answer here">

<div class="answer" id="answer${index}">
</div>

</div>

`;

});

function checkAnswers(){

let score = 0;

questions.forEach((q,index)=>{

const userAnswer =
document
.getElementById(`q${index}`)
.value
.trim()
.toLowerCase();

const answerBox =
document.getElementById(`answer${index}`);

if(userAnswer === q.answer.toLowerCase()){

score++;

answerBox.innerHTML =
`✓ Correct! Answer: ${q.answer}`;

answerBox.className =
"answer correct";

}else{

answerBox.innerHTML =
`✗ Correct Answer: ${q.answer}`;

answerBox.className =
"answer wrong";

}

answerBox.style.display = "block";

});

const percent =
Math.round((score/questions.length)*100);

document.getElementById("score")
.innerHTML =
`${score} / ${questions.length}`;

document.getElementById("percentage")
.innerHTML =
`${percent}%`;

let badge = "";

if(percent >= 90){
badge = "🏆 Academic Master";
}
else if(percent >= 70){
badge = "🎓 Strong Academic Vocabulary";
}
else if(percent >= 50){
badge = "📘 Developing Vocabulary";
}
else{
badge = "📚 Keep Practicing";
}

document.getElementById("badge")
.innerHTML = badge;

document.getElementById("resultBox")
.style.display = "block";

window.scrollTo({
top:document.body.scrollHeight,
behavior:"smooth"
});

}

</script>

</body>
</html>
